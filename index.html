<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tocar para abrir</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffd6e8; /* rosado pastel */
    overflow: hidden;
    font-family: 'Segoe UI', Verdana, sans-serif;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  #btn {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 18px 34px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #ffffff;
    background: #ff7fa8;
    border: none;
    border-radius: 50px;
    box-shadow: 0 6px 14px rgba(255, 105, 150, 0.45);
    cursor: pointer;
    transition: left 0.25s ease, top 0.25s ease, transform 0.15s ease, background 0.2s ease;
    touch-action: none;
    user-select: none;
    z-index: 5;
  }

  #btn:active {
    transform: translate(-50%, -50%) scale(0.95);
  }

  #hint {
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    color: #d1447f;
    font-size: 0.95rem;
    text-align: center;
    width: 80%;
  }

  #imgWrap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 3s ease-in-out;
  }

  #imgWrap.show {
    opacity: 1;
  }

  #imgWrap img {
    max-width: 98%;
    max-height: 98%;
    width: auto;
    height: auto;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
</style>
</head>

<script>
  const btn = document.getElementById('btn');
  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const imgWrap = document.getElementById('imgWrap');

  let attempts = 0;
  const requiredAttempts = 5;

  function moveButtonRandomly() {
    const stageRect = stage.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    const margin = 20;
    const maxLeft = stageRect.width - btnRect.width - margin;
    const maxTop = stageRect.height - btnRect.height - margin;

    const newLeft = margin + Math.random() * Math.max(0, maxLeft - margin);
    const newTop = margin + Math.random() * Math.max(0, maxTop - margin);

    btn.style.transform = 'translate(0, 0)';
    btn.style.left = newLeft + 'px';
    btn.style.top = newTop + 'px';
  }

  function escapeButton(e) {
    if (attempts < requiredAttempts) {
      e.preventDefault();
      attempts++;
      moveButtonRandomly();

      const remaining = requiredAttempts - attempts;
      if (remaining > 0) {
        hint.textContent = '¡Casi! Intento fallido. Te quedan ' + remaining + ' intento' + (remaining === 1 ? '' : 's') + '...';
      }
    }
  }

  function tryOpen(e) {
    if (attempts < requiredAttempts) {
      escapeButton(e);
      return;
    }
    // Quinto intento: se deja "clickear" de verdad
    hint.textContent = '¡Lo lograste!';
    btn.style.display = 'none';
    imgWrap.classList.add('show');
  }

  // Escapa antes de que el click/touch complete la acción
  btn.addEventListener('mouseenter', escapeButton);
  btn.addEventListener('touchstart', function(e){
    escapeButton(e);
  }, { passive: false });

  btn.addEventListener('click', tryOpen);

  // Posición inicial
  window.addEventListener('load', moveButtonRandomly);
</script>
