<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pastor Saltarín</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #bfe8ff;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    touch-action: none;
    overscroll-behavior: none;
  }

  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  #hud {
    position: fixed;
    top: env(safe-area-inset-top, 0px);
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 14px 18px;
    color: #4a3b2a;
    font-weight: bold;
    font-size: 1rem;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    pointer-events: none;
    z-index: 5;
  }

  #overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #4a3b2a;
    text-align: center;
    padding: 24px;
    z-index: 10;
    background: rgba(234, 247, 255, 0.55);
    backdrop-filter: blur(2px);
  }

  #overlay h1 {
    margin: 0 0 4px;
    font-size: 1.6rem;
  }

  #overlay h2 {
    margin: 0 0 8px;
    font-size: 1.3rem;
  }

  #overlay p {
    margin: 2px 0;
    font-size: 0.95rem;
    max-width: 280px;
  }

  #startBtn {
    margin-top: 18px;
    padding: 14px 34px;
    font-size: 1.05rem;
    font-weight: bold;
    border: none;
    border-radius: 40px;
    background: #ff9f68;
    color: white;
    box-shadow: 0 6px 16px rgba(255,120,60,0.45);
  }

  #startBtn:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <span id="scoreLabel">Puntos: 0</span>
  <span id="highLabel">Récord: 0</span>
</div>

<div id="overlay">
  <h1>🐕 Pastor Saltarín 🐈</h1>
  <h2 id="overlayTitle">¡Salta a los gatitos!</h2>
  <p id="overlaySub">Toca en cualquier parte de la pantalla para saltar</p>
  <button id="startBtn">Jugar</button>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreLabel = document.getElementById('scoreLabel');
  const highLabel = document.getElementById('highLabel');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const startBtn = document.getElementById('startBtn');

  let W = window.innerWidth;
  let H = window.innerHeight;
  let DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2.5));
  let GROUND_Y = H * 0.78;

  function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2.5));
    GROUND_Y = H * 0.78;

    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    dog.x = Math.max(50, W * 0.12);
    if (!running) {
      dog.y = GROUND_Y;
    }
    render();
  }

  let HIGH_SCORE = 0;
  try {
    HIGH_SCORE = parseInt(localStorage.getItem('pastorSaltarinHighScore') || '0', 10) || 0;
  } catch (e) {
    HIGH_SCORE = 0;
  }
  highLabel.textContent = 'Récord: ' + HIGH_SCORE;

  // --- Estado del juego ---
  let running = false;
  let gameOver = false;
  let score = 0;
  const baseSpeed = 6.5;
  let speed = baseSpeed;
  let elapsedFrames = 0;

  const dog = {
    x: 70,
    y: 0,
    w: 62,
    h: 46,
    vy: 0,
    jumping: false,
    legPhase: 0
  };
  const GRAVITY = 0.9;
  const JUMP_FORCE = -15.5;

  let obstacles = [];
  let spawnTimer = 0;
  let nextSpawnIn = 70;

  let clouds = [];
  function initClouds() {
    clouds = [];
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * (W || window.innerWidth),
        y: 20 + Math.random() * (H * 0.35),
        s: 0.6 + Math.random() * 0.9,
        speedFactor: 0.2 + Math.random() * 0.2
      });
    }
  }

  function resetGame() {
    score = 0;
    speed = baseSpeed;
    elapsedFrames = 0;
    dog.y = GROUND_Y;
    dog.vy = 0;
    dog.jumping = false;
    dog.legPhase = 0;
    obstacles = [];
    spawnTimer = 0;
    nextSpawnIn = 70;
    gameOver = false;
  }

  function jump() {
    if (!running) {
      startGame();
      return;
    }
    if (gameOver) {
      startGame();
      return;
    }
    if (!dog.jumping) {
      dog.vy = JUMP_FORCE;
      dog.jumping = true;
    }
  }

  function startGame() {
    resetGame();
    running = true;
    overlay.style.display = 'none';
  }

  function endGame() {
    running = false;
    gameOver = true;
    const finalScore = Math.floor(score);
    if (finalScore > HIGH_SCORE) {
      HIGH_SCORE = finalScore;
      try {
        localStorage.setItem('pastorSaltarinHighScore', String(HIGH_SCORE));
      } catch (e) {}
      highLabel.textContent = 'Récord: ' + HIGH_SCORE;
      overlayTitle.textContent = '¡Nuevo récord! 🏆 ' + HIGH_SCORE;
    } else {
      overlayTitle.textContent = '¡Chocaste con un gatito! 🐾';
    }
    overlaySub.textContent = 'Puntos: ' + finalScore + '  ·  Récord: ' + HIGH_SCORE;
    startBtn.textContent = 'Reintentar';
    overlay.style.display = 'flex';
  }

  // --- Dibujo del pastor alemán ---
  function drawDog(x, y, w, h, legPhase, jumping) {
    ctx.save();
    ctx.translate(x, y);

    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(w / 2, 4, w / 2, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    const bodyTop = -h;

    ctx.fillStyle = '#5b3a22';
    const legLift = jumping ? 6 : Math.sin(legPhase) * 8;
    const legLift2 = jumping ? 6 : Math.sin(legPhase + Math.PI) * 8;

    ctx.fillRect(6, -10 + Math.max(0, legLift), 8, 12 - Math.max(0, legLift));
    ctx.fillRect(16, -10 + Math.max(0, legLift2), 8, 12 - Math.max(0, legLift2));
    ctx.fillRect(w - 24, -10 + Math.max(0, legLift2), 8, 12 - Math.max(0, legLift2));
    ctx.fillRect(w - 14, -10 + Math.max(0, legLift), 8, 12 - Math.max(0, legLift));

    ctx.fillStyle = '#c48a4f';
    ctx.beginPath();
    ctx.moveTo(4, bodyTop + h - 14);
    ctx.quadraticCurveTo(2, bodyTop + 6, 18, bodyTop);
    ctx.quadraticCurveTo(w - 10, bodyTop - 2, w - 4, bodyTop + 10);
    ctx.quadraticCurveTo(w, bodyTop + h - 16, w - 14, bodyTop + h - 10);
    ctx.quadraticCurveTo(20, bodyTop + h - 6, 4, bodyTop + h - 14);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#3b2a1e';
    ctx.beginPath();
    ctx.moveTo(14, bodyTop + 2);
    ctx.quadraticCurveTo(w - 16, bodyTop - 4, w - 6, bodyTop + 8);
    ctx.quadraticCurveTo(w - 14, bodyTop + h - 12, 22, bodyTop + h - 8);
    ctx.quadraticCurveTo(10, bodyTop + 14, 14, bodyTop + 2);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#c48a4f';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(4, bodyTop + 6);
    const tailWag = jumping ? -10 : Math.sin(legPhase * 1.4) * 6 - 6;
    ctx.quadraticCurveTo(-10, bodyTop + tailWag, -14, bodyTop - 4 + tailWag);
    ctx.stroke();

    ctx.fillStyle = '#c48a4f';
    ctx.beginPath();
    ctx.moveTo(w - 6, bodyTop + 8);
    ctx.lineTo(w + 16, bodyTop - 6);
    ctx.lineTo(w + 22, bodyTop + 4);
    ctx.lineTo(w + 8, bodyTop + 16);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#3b2a1e';
    ctx.beginPath();
    ctx.moveTo(w + 14, bodyTop);
    ctx.lineTo(w + 24, bodyTop + 2);
    ctx.lineTo(w + 20, bodyTop + 8);
    ctx.lineTo(w + 10, bodyTop + 8);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#3b2a1e';
    ctx.beginPath();
    ctx.moveTo(w, bodyTop - 6);
    ctx.lineTo(w + 4, bodyTop - 20);
    ctx.lineTo(w + 10, bodyTop - 5);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#1c130c';
    ctx.beginPath();
    ctx.arc(w + 10, bodyTop + 4, 1.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // --- Dibujo de gato obstáculo ---
  function drawCat(x, y, w, h, wobble) {
    ctx.save();
    ctx.translate(x, y);

    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(w / 2, 4, w / 2 + 2, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    const bodyTop = -h;

    ctx.strokeStyle = '#4d4d4d';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w - 2, bodyTop + h - 8);
    ctx.quadraticCurveTo(w + 12, bodyTop + h - 4 + wobble, w + 10, bodyTop + 2);
    ctx.stroke();

    ctx.fillStyle = '#4d4d4d';
    ctx.beginPath();
    ctx.ellipse(w / 2, bodyTop + h - 10, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(w / 2, bodyTop + 10, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(w / 2 - 10, bodyTop + 2);
    ctx.lineTo(w / 2 - 14, bodyTop - 10);
    ctx.lineTo(w / 2 - 2, bodyTop - 2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w / 2 + 10, bodyTop + 2);
    ctx.lineTo(w / 2 + 14, bodyTop - 10);
    ctx.lineTo(w / 2 + 2, bodyTop - 2);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#ffd76b';
    ctx.beginPath();
    ctx.arc(w / 2 - 4, bodyTop + 9, 2, 0, Math.PI * 2);
    ctx.arc(w / 2 + 4, bodyTop + 9, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w / 2 - 6, bodyTop + 13);
    ctx.lineTo(w / 2 - 16, bodyTop + 11);
    ctx.moveTo(w / 2 + 6, bodyTop + 13);
    ctx.lineTo(w / 2 + 16, bodyTop + 11);
    ctx.stroke();

    ctx.restore();
  }

  function drawGround() {
    ctx.fillStyle = '#dcbf8f';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    ctx.strokeStyle = '#c7a970';
    ctx.lineWidth = 2;
    ctx.setLineDash([14, 14]);
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 4);
    ctx.lineTo(W, GROUND_Y + 4);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#8fce6a';
    ctx.fillRect(0, GROUND_Y - 4, W, 4);
  }

  function drawCloud(c) {
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, 22 * c.s, 12 * c.s, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + 18 * c.s, c.y + 4 * c.s, 16 * c.s, 10 * c.s, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x - 16 * c.s, c.y + 4 * c.s, 14 * c.s, 9 * c.s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function spawnObstacle() {
    const scale = (0.9 + Math.random() * 0.5) * (H / 700);
    obstacles.push({
      x: W + 20,
      w: 34 * scale,
      h: 36 * scale,
      wobble: Math.random() * 2,
      passed: false
    });
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function update() {
    elapsedFrames++;

    speed = baseSpeed + Math.min(elapsedFrames / 400, 6);

    dog.vy += GRAVITY;
    dog.y += dog.vy;
    if (dog.y > GROUND_Y) {
      dog.y = GROUND_Y;
      dog.vy = 0;
      dog.jumping = false;
    }
    if (!dog.jumping) {
      dog.legPhase += 0.35 * (speed / baseSpeed);
    }

    spawnTimer++;
    if (spawnTimer > nextSpawnIn) {
      spawnObstacle();
      spawnTimer = 0;
      nextSpawnIn = 55 + Math.random() * 55 - Math.min(elapsedFrames / 60, 25);
      nextSpawnIn = Math.max(nextSpawnIn, 32);
    }

    const dogHitboxX = dog.x + 10;
    const dogHitboxY = dog.y - dog.h + 8;
    const dogHitboxW = dog.w - 14;
    const dogHitboxH = dog.h - 10;

    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed;
      o.wobble = Math.sin((elapsedFrames + i * 10) * 0.2) * 2;

      const catHitboxX = o.x + 4;
      const catHitboxY = GROUND_Y - o.h + 6;
      const catHitboxW = o.w - 8;
      const catHitboxH = o.h - 6;

      if (rectsOverlap(dogHitboxX, dogHitboxY, dogHitboxW, dogHitboxH, catHitboxX, catHitboxY, catHitboxW, catHitboxH)) {
        endGame();
        return;
      }

      if (o.x + o.w < -20) {
        obstacles.splice(i, 1);
      }
    }

    for (const c of clouds) {
      c.x -= speed * c.speedFactor;
      if (c.x < -40) {
        c.x = W + 40;
        c.y = 20 + Math.random() * (H * 0.35);
      }
    }

    score += speed * 0.045;
    scoreLabel.textContent = 'Puntos: ' + Math.floor(score);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);

    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    skyGrad.addColorStop(0, '#bfe8ff');
    skyGrad.addColorStop(1, '#eaf7ff');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    for (const c of clouds) drawCloud(c);

    drawGround();

    for (const o of obstacles) {
      drawCat(o.x, GROUND_Y, o.w, o.h, o.wobble);
    }

    drawDog(dog.x, dog.y, dog.w, dog.h, dog.legPhase, dog.jumping);
  }

  function loop() {
    if (running) {
      update();
      render();
    }
    requestAnimationFrame(loop);
  }

  // --- Controles: tocar en cualquier parte ---
  function handleTap(e) {
    if (e.target === startBtn) return;
    e.preventDefault();
    jump();
  }

  window.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      jump();
    }
  });

  document.addEventListener('touchstart', handleTap, { passive: false });
  document.addEventListener('mousedown', handleTap);

  startBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    startGame();
  });

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', function() {
    setTimeout(resizeCanvas, 200);
  });

  initClouds();
  resizeCanvas();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
